<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unisysnova - Sistema de Proyectos Universitarios</title>
	
	<!-- Bootstrap -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	
	<!-- Remix Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">
	
	<!-- Styles -->
	<link rel="stylesheet" href="./assets/css/styles.min.css">
</head>
<body class="bg-white">
	<div class="row mx-0 min-h-100">
		<div class="col-xl-7 col-xxl-6">
			<div class="row mx-0 justify-content-center align-items-center h-100">
				<div class="col-sm-8 col-md-7 col-xxl-6">
					<div class="p-sm-5">
						<h1 class="h5 fw-semibold mb-2">Inscribirse</h1>
						<p class="mb-3 text-muted fw-normal op-7">¡Bienvenido/a! ¡Únete a nosotros creando una cuenta gratuita!</p>
						
						<div class="pt-3">
							<div class="row gy-3">
								<div class="col-12">
									<label for="nombre" class="form-label text-default">Nombre completo</label>
									
									<input type="text" name="nombre" id="nombre" class="form-control form-control-lg" placeholder="Nombre completo">
								</div>
								
								<div class="col-12">
									<label for="correo" class="form-label text-default">Correo electrónico</label>
									
									<input type="text" name="correo" id="correo" class="form-control form-control-lg" placeholder="Correo electrónico">
								</div>
								
								<div class="col-12 d-grid mt-4">
									<button class="btn btn-lg btn-primary">Crear cuenta</button>
								</div>
							</div>
							
							<div class="text-center my-4 barrier">
								<span>O</span>
							</div>
							
							<div class="btn-list text-center">
								<button class="btn btn-light">
									<i class="ri-google-line fw-bold"></i>
									<span>Regístrate con Google</span>
								</button>
								
								<button class="btn btn-icon btn-light">
									<i class="ri-facebook-line fw-bold"></i>
								</button>
								
								<button class="btn btn-icon btn-light">
									<i class="ri-twitter-x-line fw-bold"></i>
								</button>
							</div>

							<div class="text-center">
								<p class="fs-12 text-muted mt-4">
									<span>¿Ya tienes una cuenta?</span>
									<a href="" class="link-primary d-inline-block">Iniciar sesión</a>
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<!-- Scripts -->
	<!-- Bootstrap -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
