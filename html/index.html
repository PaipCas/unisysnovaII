<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Unisysnova - Sistema de Proyectos Universitarios</title>

	<!-- Favicon -->
	 <link rel="shortcut icon" href="./assets/images/logos/icon.svg" type="image/x-icon">
	
	<!-- Bootstrap -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	
	<!-- Remix Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">
	
	<!-- Styles -->
	<link rel="stylesheet" href="./assets/css/styles.min.css">
	<link rel="stylesheet" href="./assets/css/desktop.min.css" media="(min-width: 992px)">
</head>
<body>
	<div id="loader">
		<img src="./assets/images/decorations/loader.svg" alt="Loader">
	</div>

	<div class="page">
		<header class="app-header">
			<div class="main-header-container container-fluid">
				<div class="header-content-left">
					<div class="header-element">
						<div class="horizontal-logo">
							<a href="./index.html" class="header-logo">
								<img src="./assets/images/logos/iconWhite.svg" alt="Icon">
							</a>
						</div>
					</div>

					<div class="header-element">
						<a href="#" class="sidemenu-toggle header-link" data-bs-toggle="sidebar">
							<span class="open-toggle me-2">
								<i class="ri-arrow-left-line header-link-icon"></i>
							</span>
						</a>
					</div>
				</div>

				<div class="header-content-right">
					<div class="header-element mainuserProfile">
						<a href="#" class="header-link dropdown-toggle" id="mainHeaderProfile" data-bs-toggle="dropdown" data-bs-auto-close="outside">
							<div class="d-flex align-items-center">
								<div class="d-sm-flex">
									<div class="avatar avatar-sm">
										<img src="./assets/images/users/user.webp" alt="User" class="rounded-circle">
									</div>

									<div class="ms-2 my-auto d-none d-xl-flex">
										<h6 class="mb-0 fs-13 d-sm-block d-none">Laura Gómez</h6>
									</div>
								</div>
							</div>
						</a>

						<ul class="dropdown-menu border-0 main-header-dropdown overflow-hidden header-profile-dropdown">
							<li>
								<a href="./settings.html" class="dropdown-item border-bottom">
									<i class="ri-settings-3-line fs-13 me-2"></i>
									<span>Configuración</span>
								</a>
							</li>

							<li>
								<a href="./login.html" class="dropdown-item">
									<i class="ri-logout-box-r-line fs-13 me-2"></i>
									<span>Cerrar sesión</span>
								</a>
							</li>
						</ul>
					</div>
				</div>
			</div>
		</header>
	</div>
	
	<!-- Scripts -->
	<!-- Bootstrap -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Custom -->
	 <script src="./assets/js/scripts.min.js"></script>
</body>
</html>
